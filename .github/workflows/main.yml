name: MAX RDP TAILSCALE OPENGL FIX

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:

    - name: Create user
      run: |
        net user gamer Passw0rd! /add
        net localgroup administrators gamer /add

    - name: Enable RDP
      run: |
        reg add "HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Install Tailscale
      run: |
        choco install tailscale -y

    - name: Start Tailscale (fixed path)
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey tskey-auth-ktMWauDQ3C11CNTRL-ptdTQ92Xh8Z9dpKLggXh7ZoaLVsy8Ui8V --hostname githubrdp

    - name: Enable DirectX WARP
      run: |
        reg add "HKLM\SOFTWARE\Microsoft\Direct3D" /v UseWARP /t REG_DWORD /d 1 /f

    - name: Install OpenGL / DX / VC++
      run: |
        choco install mesa -y
        choco install vcredist-all -y
        choco install directx -y
        choco install dotnetfx -y

    - name: Disable sleep
      run: |
        powercfg -change -standby-timeout-ac 0
        powercfg -change -monitor-timeout-ac 0

    - name: Keep alive
      run: |
        while ($true) { Start-Sleep 60 }
