name: Toontown RDP Fix (Phone Optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: 1. Download Mesa3D
      shell: powershell
      run: |

        curl.exe -L -o mesa.7z https://github.com/pal1000/mesa-dist-win/releases/download/23.1.9/mesa3d-23.1.9-release-msvc.7z

        mkdir C:\mesa -ErrorAction SilentlyContinue

        & "C:\Program Files\7-Zip\7z.exe" x mesa.7z -oC:\mesa -y

        [System.Environment]::SetEnvironmentVariable("GALLIUM_DRIVER","llvmpipe","Machine")

        echo C:\mesa\x64 >> $env:GITHUB_PATH


    - name: 2. Enable RDP (Safe)
      shell: powershell
      run: |

        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
          -Name "fDenyTSConnections" -Value 0

        Set-ItemProperty -Path `
        'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
        -Name "UserAuthentication" -Value 0

        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

        # Create user only if not exists
        $user = Get-LocalUser -Name "runneradmin" -ErrorAction SilentlyContinue

        if (!$user) {
          net user runneradmin Pass123! /add
          net localgroup administrators runneradmin /add
        }


    - name: 3. Start Tunnel
      shell: cmd
      run: |

        echo =====================
        echo CONNECT WITH RD APP
        echo =====================

        :loop
        ssh -o StrictHostKeyChecking=no -R 0:localhost:3389 tcp@a.pinggy.io
        timeout /t 5
        goto loop
