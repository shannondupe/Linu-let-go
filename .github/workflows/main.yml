name: MAX RDP OPENGL DX

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:

    - name: Create Admin User
      run: |
        net user gamer Passw0rd! /add
        net localgroup administrators gamer /add

    - name: Enable RDP
      run: |
        reg add "HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Enable WARP DirectX GPU
      run: |
        reg add "HKLM\SOFTWARE\Microsoft\Direct3D" /v UseWARP /t REG_DWORD /d 1 /f

    - name: Install OpenGL + DirectX + VC++
      run: |
        choco install mesa -y
        choco install directx -y
        choco install vcredist-all -y
        choco install dotnetfx -y

    - name: Disable sleep / power save
      run: |
        powercfg -change -standby-timeout-ac 0
        powercfg -change -monitor-timeout-ac 0

    - name: Show IP
      run: |
        ipconfig

    - name: Keep Alive
      run: |
        while ($true) { Start-Sleep 60 }
